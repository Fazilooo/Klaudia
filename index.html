<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mur TO</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#1a1a1a;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
    color:white;
    text-align:center;
}

.container{
    padding:15px;
}

h1{
    margin-top:10px;
    font-size:30px;
}

.subtitle{
    opacity:0.8;
    margin-bottom:20px;
}

.character{

    width:220px;

    position:fixed;

    bottom:0;

    right:-180px;

    z-index:9999;

    transition:0.2s;

    pointer-events:none;

}

.character.active{

    right:-20px;

    animation:hammerHit 0.22s infinite;

}

.character img{

    width:100%;

    pointer-events:none;

    user-select:none;

}

@keyframes hammerHit{

    0%{
        transform:
            rotate(0deg)
            translateY(0px);
    }

    50%{
        transform:
            rotate(-14deg)
            translateY(8px);
    }

    100%{
        transform:
            rotate(0deg)
            translateY(0px);
    }

}

#progressContainer{

    width:220px;

    height:14px;

    background:#333;

    border-radius:20px;

    overflow:hidden;

    display:none;

    position:fixed;

    top:110px;

    left:50%;

    transform:translateX(-50%);

    z-index:3000;

    box-shadow:
        0 0 12px rgba(0,0,0,0.4);

}

#progressBar{

    width:0%;

    height:100%;

    background:#47b15d;

    transition:width 0.04s linear;

}

#wall{
    width:160px;
    margin:20px auto;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.brick{

    width:74px;
    height:74px;

    margin:2px;

    cursor:pointer;

    transition:0.6s ease;

    position:relative;

    border-radius:2px;

    border:1px solid #5e2a1d;

    background:

        linear-gradient(
            180deg,
            #b85c38 0%,
            #9e4425 100%
        );

    box-shadow:
        inset 0 -4px 0 rgba(0,0,0,0.2),
        inset 0 2px 0 rgba(255,255,255,0.08),
        0 2px 5px rgba(0,0,0,0.35);

    overflow:hidden;
}

.brick::before{

    content:"";

    position:absolute;

    inset:0;

    background:

        repeating-linear-gradient(
            90deg,
            rgba(255,255,255,0.04) 0px,
            rgba(255,255,255,0.04) 2px,
            transparent 2px,
            transparent 16px
        ),

        repeating-linear-gradient(
            0deg,
            rgba(0,0,0,0.06) 0px,
            rgba(0,0,0,0.06) 2px,
            transparent 2px,
            transparent 16px
        );

    opacity:0.7;

}

.brick:active{
    transform:scale(0.9);
}

.destroyed{
    opacity:0;
    transform:
        rotate(720deg)
        translateY(400px);
}

#message{

    min-height:260px;

    padding:0 15px;

    margin-top:10px;

    font-size:18px;
    max-height:320px;
overflow-y:auto;
    position:relative;
z-index:5000;

}

#questionBox{

    display:none;

    position:fixed;

    inset:0;

    background:
        linear-gradient(
            rgba(0,0,0,0.55),
            rgba(0,0,0,0.55)
        ),
        url("beg.jpg");

    background-size:cover;

    background-position:center;

    z-index:2000;

    padding-top:120px;

}

.question{
    font-size:25px;
    margin-bottom:30px;
    padding:0 15px;
}

.buttons{
    position:relative;
    width:100%;
    height:220px;
}

button{
    border:none;
    border-radius:14px;
    padding:16px 28px;
    font-size:22px;
    cursor:pointer;
    transition:0.2s;
    display:block;
margin:12px auto;
    position:relative;
z-index:6000;
}

#yesBtn{
    position:absolute;
    background:#47b15d;
    color:white;
    left:50%;
    transform:translateX(-120%);
}

#noBtn{
    position:absolute;
    background:#cf4343;
    color:white;
    left:50%;
    transform:translateX(20%);
}

#finalScreen{

    display:none;

    position:fixed;

    inset:0;

    background:
        linear-gradient(
            rgba(0,0,0,0.55),
            rgba(0,0,0,0.55)
        ),
        url("happy.jpg");

    background-size:cover;

    background-position:center;

    animation:appear 0.5s ease;

    padding:25px;

}

@keyframes appear{
    from{
        opacity:0;
        transform:scale(0.7);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.finalTitle{
    font-size:34px;
    margin-bottom:25px;
}

.finalText{
    font-size:21px;
    line-height:1.7;
}

.small{
    margin-top:25px;
    opacity:0.6;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container" id="game">

    <h1>🧱 Niszczenie muru by zdobyć</h1>

    <div class="subtitle">
        Discord Nitro ⚠️
    </div>



    <div id="wall"></div>

    <div id="message"></div>

    <div id="progressContainer">

    <div id="progressBar"></div>

</div>

<div class="character" id="hammerGirl">

    <img src="Klaudia.png">

</div>

<div id="questionBox">

        <div class="question">
            Czujesz satysfakcję z zakończenia gry?
        </div>

        <div class="buttons">

            <button id="yesBtn">
                TAK 
            </button>

            <button id="noBtn">
                NIE 
            </button>

        </div>

    </div>

</div>

<div id="finalScreen">

    <div class="finalTitle">
        ⚠ SYSTEM ALERT ⚠
    </div>

    <div class="finalText">

        Mur oficjalnie upadł!.<br><br>

        Twój kod do discord nitro znajduje się poniżej:<br><br>

        xxx<br><br>

    </div>

    <div class="small">
        Gratulujemy wygranej!
    </div>

</div>

<script>

const wall = document.getElementById("wall");
const message = document.getElementById("message");
const questionBox = document.getElementById("questionBox");

const texts = [

    "Mur otrzymał obrażenia krytyczne 💥",
    "Mur powoli upada!",
    "Kolejna cegła spada",
    "Mur traci stabilność 🧱"

];

const brickNames = [

    "foch",
    "upór",
    "dystans",
    "nie no co ty",
    "mur premium",
    "emocjonalny firewall",
    "ukrywanie",
    "obraza",
    "udawanie"

];

let destroyed = 0;

const brickTypes = [

    "hold",
    "spam",
    "elias1",
    "elias",
    "foch",
    "final"

];

let holdInterval;

let holdProgress = 0;

const progressContainer =
document.getElementById("progressContainer");

const progressBar =
document.getElementById("progressBar");

const hammerGirl =
document.getElementById("hammerGirl");

    function checkFinish(){

    if(destroyed >= 6){

        setTimeout(()=>{

            wall.style.display = "none";

            message.style.display = "none";

            progressContainer.style.display = "none";

            questionBox.style.display = "block";

        },500);

    }

}

    let activeBrick = null;
for(let i=0;i<6;i++){

    const brick = document.createElement("div");

    brick.className = "brick";

    brick.dataset.type = brickTypes[i];

    function destroyBrick(){

    brick.classList.add("destroyed");

    destroyed++;

    checkFinish();
        activeBrick = null;

}



function startBreaking(){
    const type = brick.dataset.type;
    if(activeBrick && activeBrick !== brick){

    message.innerHTML = "";

    activeBrick.dataset.started = "";

}

activeBrick = brick;

if(type === "spam"){

    if(brick.classList.contains("destroyed")) return;

    if(brick.dataset.started !== "true"){

        brick.dataset.started = "true";

        brick.dataset.clicks = 0;

        message.innerHTML =
            "🔥 Klikaj cegłę! (0/15)";

    }

    brick.dataset.clicks++;

    message.innerHTML =
        "🔥 Klikaj cegłę! (" +
        brick.dataset.clicks +
        "/15)";

    brick.style.transform =
        "scale(0.93)";

    setTimeout(()=>{

        brick.style.transform =
            "scale(1)";

    },60);

    if(brick.dataset.clicks >= 15){

        destroyBrick();

        message.innerHTML =
            "💥 Cegła spanikowała";

    }

    return;
}




    
if(type === "elias1"){

    const answer =
        prompt("Kolor dominujący w naszej gildii to? ");

    if(
        answer &&
        answer.toLowerCase() === "Fioletowy"
    ){

        brick.classList.add("destroyed");

        destroyed++;

        message.innerText =
            "Poprawna odpowiedź 😎";

    }
    else{

        message.innerText =
            "🚨 System wykrył herezję";

    }

    return;
}

if(type === "foch"){

    if(brick.dataset.started) return;

    brick.dataset.started = "true";

    message.innerHTML = `

        <div style="font-size:24px;margin-bottom:20px;">
            Ile lat ma TO?
        </div>

        <div style="margin-bottom:15px;">
            HMM?
        </div>

        <button onclick="answerCheck(false)">
            1 rok
        </button>

        <button onclick="answerCheck(false)">
            3 lata
        </button>

        <button onclick="answerCheck(true)">
            2 lata
        </button>

        <button onclick="answerCheck(false)">
            4 lata
        </button>

    `;

    window.answerCheck = (good)=>{

        if(good){

            message.innerHTML =
                "✅ Poprawna odpowiedź";

            destroyBrick();

        }
        else{

            message.innerHTML = `

                <div style="font-size:24px;margin-bottom:20px;">
                    🚨 Wykryto kłamstwo
                </div>

                <button onclick="retryFoch()">
                    spróbuj jeszcze raz
                </button>

            `;

        }

    };

    window.retryFoch = ()=>{

        brick.dataset.started = "";

        startBreaking();

    };

    return;
}

if(type === "final"){

    message.innerText =
        "⚠ OSTATNIA BARIERA";

}

    if(brick.classList.contains("destroyed")) return;

    let speed = 12;

if(type === "hold"){
    speed = 3;
}

if(type === "final"){
    speed = 6;
}

    progressContainer.style.display = "block";

    hammerGirl.classList.add("active");

    holdProgress = 0;

    holdInterval = setInterval(()=>{

        holdProgress += speed;

        progressBar.style.width =
            holdProgress + "%";

        if(holdProgress >= 100){

            clearInterval(holdInterval);

            brick.classList.add("destroyed");

            hammerGirl.classList.remove("active");

            progressContainer.style.display = "none";

            progressBar.style.width = "0%";

            if(navigator.vibrate){
                navigator.vibrate(80);
            }

            message.innerText =
                texts[Math.floor(Math.random()*texts.length)];

            destroyed++;

checkFinish();

        }

    },25);

}

function stopBreaking(){

    clearInterval(holdInterval);

    holdProgress = 0;

    progressBar.style.width = "0%";

    progressContainer.style.display = "none";

    hammerGirl.classList.remove("active");

}

brick.addEventListener("mousedown", startBreaking);

brick.addEventListener("touchstart", startBreaking);

brick.addEventListener("mouseup", stopBreaking);

brick.addEventListener("mouseleave", stopBreaking);

brick.addEventListener("touchend", stopBreaking);

    wall.appendChild(brick);

}

const noBtn = document.getElementById("noBtn");

const noTexts = [

    "Kłamstwo wykryte 🚨",
    "Przycisk NIE został zablokowany 😎",
    "Mur próbuje się bronić 🧱",
    "No nie kombinuj 👀",
    "Ta opcja jest chwilowo niedostępna 😌"

];

function moveButton(){

    const x =
        Math.random() * (window.innerWidth - 140);

    const y =
        Math.random() * 120;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    message.innerText =
        noTexts[Math.floor(Math.random()*noTexts.length)];

}

noBtn.addEventListener("click", moveButton);
noBtn.addEventListener("touchstart", moveButton);

document.getElementById("yesBtn")
.addEventListener("click", ()=>{

    document.getElementById("game")
    .style.display = "none";

    document.getElementById("finalScreen")
    .style.display = "block";

    if(navigator.vibrate){
        navigator.vibrate([100,50,100]);
    }

});

</script>

</body>
</html>
